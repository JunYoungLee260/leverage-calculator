<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이딩 비중 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --panel: #0f1318;
    --border: #1e2530;
    --border-bright: #2e3d50;
    --accent: #00e5ff;
    --accent-dim: rgba(0, 229, 255, 0.08);
    --accent-glow: rgba(0, 229, 255, 0.25);
    --danger: #ff3d5a;
    --danger-dim: rgba(255, 61, 90, 0.08);
    --success: #00e09e;
    --text: #c8d8e8;
    --text-dim: #5a7088;
    --text-bright: #eaf4ff;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(0,229,255,0.06) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
  }

  .container {
    width: 100%;
    max-width: 640px;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.5px;
  }

  .header .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.7;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap .prefix {
    position: absolute;
    left: 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    pointer-events: none;
    z-index: 1;
  }

  .input-wrap .suffix {
    position: absolute;
    right: 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 40px 11px 34px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-bright);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  input[type="number"].no-prefix {
    padding-left: 12px;
  }

  /* Toggle switch */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .toggle-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* Direction toggle */
  .direction-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .dir-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .dir-btn.long { color: var(--success); }
  .dir-btn.long.active {
    background: rgba(0, 224, 158, 0.1);
    border-color: var(--success);
    box-shadow: 0 0 10px rgba(0,224,158,0.15);
  }

  .dir-btn.short { color: var(--danger); }
  .dir-btn.short.active {
    background: rgba(255, 61, 90, 0.1);
    border-color: var(--danger);
    box-shadow: 0 0 10px rgba(255,61,90,0.15);
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Results */
  .result-card {
    background: var(--panel);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--success));
    opacity: 0.6;
  }

  .result-highlight {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .result-highlight .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .leverage-value {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 30px var(--accent-glow);
    letter-spacing: -2px;
  }

  .leverage-value .unit {
    font-size: 20px;
    opacity: 0.6;
    letter-spacing: 0;
  }

  .leverage-warn {
    font-size: 11px;
    color: var(--danger);
    margin-top: 6px;
    font-family: var(--mono);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .leverage-warn.show { opacity: 1; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .stat-box .s-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-box .s-value {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .stat-box.danger .s-value { color: var(--danger); }
  .stat-box.success .s-value { color: var(--success); }
  .stat-box.accent .s-value { color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 1px;
  }

  .empty-state .icon {
    font-size: 28px;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 16px;
  }

  .divider hr {
    flex: 1;
    border: none;
    border-top: 1px solid var(--border);
  }

  .divider span {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
    letter-spacing: 0.5px;
    padding: 8px;
  }

  .risk-bar-wrap {
    margin-top: 16px;
  }

  .risk-bar-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .risk-bar {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 99px;
    overflow: hidden;
  }

  .risk-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease, background 0.4s;
    background: linear-gradient(90deg, var(--success), var(--accent));
  }

  .risk-bar-fill.medium { background: linear-gradient(90deg, var(--accent), #ffd700); }
  .risk-bar-fill.high { background: linear-gradient(90deg, #ffd700, var(--danger)); }
  .risk-bar-fill.extreme { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
    .leverage-value { font-size: 42px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="label">⬡ Position Sizing</div>
    <h1>트레이딩 비중 계산기</h1>
    <div class="sub">리스크 기반 레버리지 · 진입 비중 산출</div>
  </div>

  <!-- 자산 정보 -->
  <div class="card">
    <div class="card-title">/ 01 · 자산 정보</div>
    <div class="field">
      <label>현재 총 자산</label>
      <div class="input-wrap">
        <span class="prefix">$</span>
        <input type="number" id="totalAsset" placeholder="10,000" min="0">
        <span class="suffix">USD</span>
      </div>
    </div>
  </div>

  <!-- 가격 정보 -->
  <div class="card">
    <div class="card-title">/ 02 · 진입 & 손절 가격</div>
    <div class="direction-row">
      <button class="dir-btn long active" onclick="setDirection('long')">▲ LONG</button>
      <button class="dir-btn short" onclick="setDirection('short')">▼ SHORT</button>
    </div>
    <div class="row2">
      <div class="field">
        <label>진입 가격</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="entryPrice" placeholder="50,000" min="0">
        </div>
      </div>
      <div class="field">
        <label>손절 가격</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="stopPrice" placeholder="48,000" min="0">
        </div>
      </div>
    </div>
    <div class="stat-box" style="margin-top:4px; background: rgba(255,61,90,0.04); border-color: rgba(255,61,90,0.15);">
      <div class="s-label">손절 거리 (슬리피지 제외)</div>
      <div class="s-value" id="stopDistVal" style="color:var(--danger)">— %</div>
    </div>
  </div>

  <!-- 리스크 설정 -->
  <div class="card">
    <div class="card-title">/ 03 · 손절 시 허용 손실</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="toggleAmt" onclick="setMode('amount')">금액 ($)</button>
      <button class="toggle-btn" id="togglePct" onclick="setMode('percent')">비율 (%)</button>
    </div>

    <div id="amountField" class="field">
      <label>손절 시 잃을 금액</label>
      <div class="input-wrap">
        <span class="prefix">$</span>
        <input type="number" id="riskAmount" placeholder="100" min="0">
        <span class="suffix">USD</span>
      </div>
    </div>

    <div id="percentField" class="field" style="display:none">
      <label>총 자산 대비 손실 허용 비율</label>
      <div class="input-wrap">
        <input type="number" id="riskPercent" placeholder="1.0" min="0" max="100" step="0.1" class="no-prefix">
        <span class="suffix">%</span>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div class="result-card" id="resultCard">
    <div class="card-title">/ 결과</div>
    <div id="emptyState" class="empty-state">
      <div class="icon">◈</div>
      위 항목을 입력하면 결과가 표시됩니다
    </div>
    <div id="resultContent" style="display:none">
      <div class="result-highlight">
        <div class="label">권장 레버리지</div>
        <div class="leverage-value" id="leverageVal">—<span class="unit">x</span></div>
        <div class="leverage-warn" id="leverageWarn">⚠ 고위험 레버리지 구간입니다</div>
      </div>
      <div class="stats-grid">
        <div class="stat-box accent">
          <div class="s-label">진입 금액</div>
          <div class="s-value" id="positionVal">—</div>
        </div>
        <div class="stat-box">
          <div class="s-label">실제 투자 비중</div>
          <div class="s-value" id="positionPctVal">—</div>
        </div>
        <div class="stat-box danger">
          <div class="s-label">허용 손실 금액</div>
          <div class="s-value" id="lossAmtVal">—</div>
        </div>
        <div class="stat-box">
          <div class="s-label">허용 손실 비율</div>
          <div class="s-value" id="lossPctVal">—</div>
        </div>
      </div>
      <div class="risk-bar-wrap">
        <div class="risk-bar-label">
          <span>리스크 수준</span>
          <span id="riskLevelLabel">—</span>
        </div>
        <div class="risk-bar"><div class="risk-bar-fill" id="riskBarFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="footer-note">수수료 · 슬리피지는 포함되지 않습니다 · 교육 목적</div>
</div>

<script>
  let mode = 'amount';
  let direction = 'long';

  function setMode(m) {
    mode = m;
    document.getElementById('amountField').style.display = m === 'amount' ? 'block' : 'none';
    document.getElementById('percentField').style.display = m === 'percent' ? 'block' : 'none';
    document.getElementById('toggleAmt').classList.toggle('active', m === 'amount');
    document.getElementById('togglePct').classList.toggle('active', m === 'percent');
    calc();
  }

  function setDirection(d) {
    direction = d;
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.dir-btn.' + d).classList.add('active');
    calc();
  }

  function fmt(n) {
    if (n === null || isNaN(n)) return '—';
    return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function calc() {
    const asset = parseFloat(document.getElementById('totalAsset').value);
    const entry = parseFloat(document.getElementById('entryPrice').value);
    const stop  = parseFloat(document.getElementById('stopPrice').value);

    // Stop distance
    if (entry > 0 && stop > 0) {
      const dist = direction === 'long'
        ? ((entry - stop) / entry * 100)
        : ((stop - entry) / entry * 100);
      document.getElementById('stopDistVal').textContent = dist > 0 ? dist.toFixed(2) + ' %' : '— (방향 확인)';
    } else {
      document.getElementById('stopDistVal').textContent = '— %';
    }

    if (!asset || !entry || !stop || asset <= 0 || entry <= 0 || stop <= 0) {
      showEmpty(); return;
    }

    // Validate direction
    if (direction === 'long' && stop >= entry) { showEmpty(); return; }
    if (direction === 'short' && stop <= entry) { showEmpty(); return; }

    // Risk amount
    let riskAmt;
    if (mode === 'amount') {
      riskAmt = parseFloat(document.getElementById('riskAmount').value);
    } else {
      const pct = parseFloat(document.getElementById('riskPercent').value);
      if (!pct) { showEmpty(); return; }
      riskAmt = asset * pct / 100;
    }
    if (!riskAmt || riskAmt <= 0) { showEmpty(); return; }

    const stopDistPct = direction === 'long'
      ? (entry - stop) / entry
      : (stop - entry) / entry;

    if (stopDistPct <= 0) { showEmpty(); return; }

    // leverage = riskAmt / (asset * stopDistPct)
    const leverage = riskAmt / (asset * stopDistPct);
    // position size = asset * leverage
    const posSize = asset * leverage;
    const positionPct = leverage * 100;
    const lossPct = riskAmt / asset * 100;

    // Display
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultContent').style.display = 'block';

    document.getElementById('leverageVal').innerHTML = leverage.toFixed(2) + '<span class="unit">x</span>';
    document.getElementById('positionVal').textContent = fmt(posSize);
    document.getElementById('positionPctVal').textContent = positionPct.toFixed(1) + ' %';
    document.getElementById('lossAmtVal').textContent = fmt(riskAmt);
    document.getElementById('lossPctVal').textContent = lossPct.toFixed(2) + ' %';

    // Warning
    const warn = document.getElementById('leverageWarn');
    warn.classList.toggle('show', leverage > 10);

    // Risk bar
    const fill = document.getElementById('riskBarFill');
    const barPct = Math.min(lossPct / 5 * 100, 100);
    fill.style.width = barPct + '%';
    fill.className = 'risk-bar-fill';
    let riskLabel = '안전';
    if (lossPct >= 1 && lossPct < 2) { fill.classList.add('medium'); riskLabel = '보통'; }
    else if (lossPct >= 2 && lossPct < 3.5) { fill.classList.add('high'); riskLabel = '주의'; }
    else if (lossPct >= 3.5) { fill.classList.add('extreme'); riskLabel = '고위험'; }
    document.getElementById('riskLevelLabel').textContent = riskLabel + ' (' + lossPct.toFixed(2) + '%)';
  }

  function showEmpty() {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('resultContent').style.display = 'none';
  }

  // Listeners
  ['totalAsset','entryPrice','stopPrice','riskAmount','riskPercent'].forEach(id => {
    document.getElementById(id).addEventListener('input', calc);
  });
</script>
</body>
</html>
